<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Fòrum EmpatIA</title>
<style>
  :root {
    --bg:       #f0f7fa;
    --surface:  #ffffff;
    --surface2: #e8f4f9;
    --primary:  #00a8d8;
    --primary-light: #d4f0f9;
    --primary-dark:  #0088b5;
    --accent:   #1fbcd4;
    --text:     #1a3a47;
    --text2:    #4a6b7d;
    --border:   #c5e3ed;
    --danger:   #e05252;
    --emoji-bar:#e8f4f9;
    --radius:   14px;
    --shadow:   0 2px 12px rgba(0,168,216,0.08);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #00a8d8 0%, #1fbcd4 100%);
    color: #fff;
    padding: 14px 16px 10px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,168,216,0.2);
  }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing:.3px; }
  .header p  { font-size: 12px; opacity:.85; margin-top:2px; }

  .cats {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 10px 14px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display:none; }
  .cat {
    flex-shrink:0; padding: 5px 14px;
    border-radius: 20px; font-size: 13px; font-weight:500;
    cursor:pointer; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text2);
    transition: all .2s;
  }
  .cat.active {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }

  .fab {
    position: fixed; bottom: 20px; right: 18px; z-index: 200;
    width: 54px; height: 54px; border-radius: 50%;
    background: linear-gradient(135deg, #00a8d8 0%, #1fbcd4 100%); 
    color: #fff;
    font-size: 26px; border: none; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,168,216,0.35);
    display: flex; align-items:center; justify-content:center;
    transition: transform .15s;
  }
  .fab:active { transform: scale(.92); }

  .feed { padding: 12px 14px 90px; }

  .post-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .post-body { padding: 14px 14px 8px; }
  .post-meta {
    display: flex; align-items:center; gap: 8px; margin-bottom: 6px;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items:center; justify-content:center;
    font-size: 15px; font-weight: 700; color: var(--primary);
    flex-shrink: 0;
  }
  .post-author { font-weight: 600; font-size: 14px; }
  .post-time   { font-size: 11px; color: var(--text2); margin-left:auto; }
  .post-cat-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: var(--primary-light); color: var(--primary); font-weight:600;
  }
  .post-text { font-size: 15px; line-height: 1.55; color: var(--text); }
  .post-delete {
    float:right; background:none; border:none;
    color: var(--danger); font-size: 13px; cursor:pointer; opacity:.6;
    padding:2px 0; margin-left:6px;
  }

  .emoji-bar {
    display: flex; gap: 4px; padding: 8px 14px;
    background: var(--emoji-bar);
    border-top: 1px solid var(--border);
    flex-wrap: wrap; align-items: center;
  }
  .emoji-btn {
    display: flex; align-items:center; gap: 3px;
    padding: 4px 9px; border-radius: 20px;
    background: var(--surface); border: 1.5px solid var(--border);
    font-size: 14px; cursor: pointer; transition: all .15s;
    color: var(--text2); font-weight: 500;
  }
  .emoji-btn.reacted {
    background: var(--primary-light);
    border-color: var(--primary);
    color: var(--primary);
  }
  .emoji-btn:active { transform: scale(.9); }
  .emoji-count { font-size: 12px; }
  .emoji-add {
    margin-left: auto; background: none; border: 1.5px dashed var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 16px;
    cursor: pointer; color: var(--text2);
  }

  .post-footer {
    display: flex; align-items:center; gap: 6px;
    padding: 8px 14px; border-top: 1px solid var(--border);
  }
  .btn-reply {
    background: none; border: none; color: var(--primary);
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items:center; gap: 4px;
  }
  .reply-count {
    font-size: 12px; color: var(--text2); margin-left: auto;
  }

  .replies-section {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 10px 12px 12px;
  }
  .reply-card {
    background: var(--surface);
    border-radius: 10px; border: 1px solid var(--border);
    padding: 10px 12px; margin-bottom: 8px;
  }
  .reply-meta {
    display:flex; align-items:center; gap:6px; margin-bottom:4px;
  }
  .reply-author { font-weight:600; font-size:13px; }
  .reply-time   { font-size:11px; color:var(--text2); margin-left:auto; }
  .reply-text   { font-size:14px; line-height:1.5; }
  .reply-emoji-bar {
    display:flex; gap:4px; margin-top:7px; flex-wrap:wrap;
  }
  .reply-emoji-btn {
    display:flex; align-items:center; gap:2px;
    padding: 3px 7px; border-radius:16px;
    background: var(--bg); border: 1.5px solid var(--border);
    font-size:13px; cursor:pointer; transition:all .15s;
    color:var(--text2);
  }
  .reply-emoji-btn.reacted {
    background:var(--primary-light); border-color:var(--primary); color:var(--primary);
  }

  .reply-input-row {
    display:flex; gap:8px; margin-top:6px;
  }
  .reply-input {
    flex:1; border:1.5px solid var(--border); border-radius:10px;
    padding:8px 12px; font-size:14px; background:var(--surface);
    color:var(--text); outline:none; resize:none;
    font-family: inherit;
  }
  .reply-input:focus { border-color:var(--primary); }
  .reply-send {
    background:var(--primary); color:#fff; border:none;
    border-radius:10px; padding:8px 14px; font-size:20px;
    cursor:pointer; flex-shrink:0;
  }

  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
    z-index:300; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--surface); border-radius:20px 20px 0 0;
    width:100%; max-width:480px; padding:20px 18px 30px;
    box-shadow:0 -4px 24px rgba(0,0,0,0.15);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
  .modal h2 { font-size:17px; margin-bottom:14px; color:var(--primary); }
  .modal textarea {
    width:100%; border:1.5px solid var(--border); border-radius:10px;
    padding:12px; font-size:15px; font-family:inherit;
    resize:none; min-height:90px; color:var(--text); background:var(--bg);
    outline:none;
  }
  .modal textarea:focus { border-color:var(--primary); }
  .modal-cats {
    display:flex; gap:6px; flex-wrap:wrap; margin:10px 0;
  }
  .modal-cat {
    padding:5px 12px; border-radius:20px; font-size:13px;
    border:1.5px solid var(--border); cursor:pointer;
    background:var(--surface); color:var(--text2);
  }
  .modal-cat.sel {
    background:var(--primary); color:#fff; border-color:var(--primary);
  }
  .modal-actions { display:flex; gap:10px; margin-top:14px; }
  .btn-post {
    flex:1; background:var(--primary); color:#fff; border:none;
    border-radius:10px; padding:12px; font-size:16px; font-weight:600;
    cursor:pointer;
  }
  .btn-cancel {
    padding:12px 18px; border-radius:10px; border:1.5px solid var(--border);
    background:none; color:var(--text2); font-size:15px; cursor:pointer;
  }

  .emoji-picker {
    display:none; position:fixed; z-index:400;
    background:var(--surface); border-radius:14px;
    box-shadow:0 4px 24px rgba(0,0,0,0.18);
    padding:10px 12px; border:1px solid var(--border);
    flex-wrap:wrap; gap:6px; max-width:220px;
  }
  .emoji-picker.open { display:flex; }
  .ep-btn {
    font-size:22px; cursor:pointer; padding:4px;
    border-radius:8px; transition:transform .1s;
    background:none; border:none;
  }
  .ep-btn:active { transform:scale(.85); }

  .empty {
    text-align:center; padding:50px 20px;
    color:var(--text2);
  }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  .empty p { font-size:15px; }

  .loader {
    display:flex; justify-content:center; padding:30px;
  }
  .spinner {
    width:28px; height:28px; border:3px solid var(--border);
    border-top-color:var(--primary); border-radius:50%;
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  .toast {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:var(--text); color:#fff; padding:9px 20px;
    border-radius:20px; font-size:13px; z-index:500;
    opacity:0; transition:opacity .3s;
    pointer-events:none;
  }
  .toast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
  <h1>💙 Fòrum EmpatIA</h1>
  <p id="header-sub">Comparteix, dona suport i connecta</p>
</div>

<div class="cats" id="cats-bar">
  <div class="cat active" onclick="filtrarCat('Tots')">Tots</div>
  <div class="cat" onclick="filtrarCat('Suport')">🤝 Suport</div>
  <div class="cat" onclick="filtrarCat('Ansietat')">😰 Ansietat</div>
  <div class="cat" onclick="filtrarCat('Autoestima')">💛 Autoestima</div>
  <div class="cat" onclick="filtrarCat('Assoliments')">🎉 Assoliments</div>
  <div class="cat" onclick="filtrarCat('General')">💬 General</div>
</div>

<div class="feed" id="feed">
  <div class="loader"><div class="spinner"></div></div>
</div>

<button class="fab" onclick="abrirModal()">＋</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>✏️ Nou post</h2>
    <textarea id="new-post-text" placeholder="Què vols compartir avui?" maxlength="500"></textarea>
    <div class="modal-cats">
      <div class="modal-cat sel" onclick="selCat(this,'Suport')">🤝 Suport</div>
      <div class="modal-cat" onclick="selCat(this,'Ansietat')">😰 Ansietat</div>
      <div class="modal-cat" onclick="selCat(this,'Autoestima')">💛 Autoestima</div>
      <div class="modal-cat" onclick="selCat(this,'Assoliments')">🎉 Assoliments</div>
      <div class="modal-cat" onclick="selCat(this,'General')">💬 General</div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-post" onclick="publicarPost()">Publicar 🚀</button>
    </div>
  </div>
</div>

<div class="emoji-picker" id="emoji-picker">
  <button class="ep-btn" onclick="elegirEmoji('👍')">👍</button>
  <button class="ep-btn" onclick="elegirEmoji('❤️')">❤️</button>
  <button class="ep-btn" onclick="elegirEmoji('🤗')">🤗</button>
  <button class="ep-btn" onclick="elegirEmoji('😢')">😢</button>
  <button class="ep-btn" onclick="elegirEmoji('💪')">💪</button>
  <button class="ep-btn" onclick="elegirEmoji('✨')">✨</button>
  <button class="ep-btn" onclick="elegirEmoji('🙏')">🙏</button>
  <button class="ep-btn" onclick="elegirEmoji('😮')">😮</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF3e-4WPlnNNuSYpVo3edaYquLyWKajLbHccyekdH9NBOhuxis_HuVkONzpijOKo0M/exec";
let USUARIO = "Usuari";

let catActual  = "Tots";
let modalCat   = "Suport";
let pickerCtx  = null;
let postsCache = [];
let requestId  = 0;
let pendingCallbacks = {};

function llamarAppInventor(action, params, callback) {
  const id = ++requestId;
  if (callback) pendingCallbacks[id] = callback;
  const cmd = JSON.stringify({ action, params, id });
  if (window.procesarForumRequest) {
    window.procesarForumRequest(cmd);
  } else {
    console.warn("procesarForumRequest no disponible");
  }
}

function forumRespuesta(data) {
  const obj = typeof data === "string" ? JSON.parse(data) : data;
  const cb = pendingCallbacks[obj.id];
  if (cb) {
    delete pendingCallbacks[obj.id];
    cb(obj.result);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  try {
    if (window.usuarioDelApp) {
      USUARIO = window.usuarioDelApp;
    }
  } catch(e) {}
  document.getElementById("header-sub").textContent =
    "Hola " + USUARIO + " 👋 Comparteix i connecta";
  cargarPosts();
});

function cargarPosts() {
  document.getElementById("feed").innerHTML =
    '<div class="loader"><div class="spinner"></div></div>';
  llamarAppInventor("getPosts", { categoria: catActual }, (data) => {
    if (data && data.ok) {
      postsCache = data.posts || [];
      renderPosts(postsCache);
    } else {
      document.getElementById("feed").innerHTML =
        '<div class="empty"><div class="icon">⚠️</div><p>No s\'ha pogut carregar el fòrum.<br>Revisa la connexió.</p></div>';
    }
  });
}

function renderPosts(posts) {
  const feed = document.getElementById("feed");
  if (!posts.length) {
    feed.innerHTML = '<div class="empty"><div class="icon">🌱</div><p>Encara no hi ha posts.<br>Sigues el primer a compartir!</p></div>';
    return;
  }
  feed.innerHTML = posts.map(p => renderPostCard(p)).join("");
}

function renderPostCard(p) {
  const initials = (p.autor||"?")[0].toUpperCase();
  const tiempo   = tiempoRelativo(p.timestamp);
  const esAutor  = p.autor === USUARIO;
  const emojisBtns = renderEmojiBar(p.reacciones||{}, p.id, "", false);

  return `
  <div class="post-card" id="post-${p.id}">
    <div class="post-body">
      <div class="post-meta">
        <div class="avatar">${initials}</div>
        <div>
          <div class="post-author">${esc(p.autor)}</div>
          <span class="post-cat-badge">${esc(p.categoria||"General")}</span>
        </div>
        <span class="post-time">${tiempo}</span>
        ${esAutor ? `<button class="post-delete" onclick="borrarPost('${p.id}')">🗑</button>` : ""}
      </div>
      <div class="post-text">${esc(p.texto)}</div>
    </div>
    <div class="emoji-bar">
      ${emojisBtns}
      <button class="emoji-add" onclick="abrirPicker('${p.id}','',event)" title="Afegir reacció">＋😊</button>
    </div>
    <div class="post-footer">
      <button class="btn-reply" onclick="toggleReplies('${p.id}')">
        💬 Respondre
      </button>
      <span class="reply-count">${p.reply_count} respost${p.reply_count!==1?"es":""}</span>
    </div>
    <div class="replies-section" id="replies-${p.id}" style="display:none"></div>
  </div>`;
}

function renderEmojiBar(reacciones, postId, replyId, isReply) {
  const emojisDefault = ["👍","❤️","🤗","😢","💪"];
  let html = "";

  Object.entries(reacciones).forEach(([emoji, data]) => {
    const yaReaccione = data.autores.includes(USUARIO);
    const cls = isReply ? "reply-emoji-btn" : "emoji-btn";
    const fn  = isReply
      ? `toggleReaccionReply('${postId}','${replyId}','${emoji}',this)`
      : `toggleReaccion('${postId}','${emoji}',this)`;
    html += `<button class="${cls}${yaReaccione?" reacted":""}" onclick="${fn}" data-emoji="${emoji}">
      ${emoji} <span class="emoji-count">${data.count}</span>
    </button>`;
  });

  if (!isReply) {
    emojisDefault.forEach(e => {
      if (!reacciones[e]) {
        html += `<button class="emoji-btn" onclick="toggleReaccion('${postId}','${e}',this)" data-emoji="${e}">
          ${e} <span class="emoji-count">0</span>
        </button>`;
      }
    });
  }
  return html;
}

function toggleReplies(postId) {
  const sec = document.getElementById("replies-" + postId);
  if (sec.style.display === "none") {
    sec.style.display = "block";
    cargarReplies(postId);
  } else {
    sec.style.display = "none";
  }
}

function cargarReplies(postId) {
  const sec = document.getElementById("replies-" + postId);
  sec.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  llamarAppInventor("getReplies", { post_id: postId }, (data) => {
    if (data && data.ok) {
      renderReplies(postId, data.replies || []);
    } else {
      sec.innerHTML = "<p style='padding:10px;color:var(--text2);font-size:13px'>Error al carregar.</p>";
    }
  });
}

function renderReplies(postId, replies) {
  const sec = document.getElementById("replies-" + postId);
  const lista = replies.map(r => {
    const initials  = (r.autor||"?")[0].toUpperCase();
    const tiempo    = tiempoRelativo(r.timestamp);
    const esAutor   = r.autor === USUARIO;
    const emojiHtml = renderEmojiBar(r.reacciones||{}, postId, r.id, true);
    return `
    <div class="reply-card" id="reply-${r.id}">
      <div class="reply-meta">
        <div class="avatar" style="width:28px;height:28px;font-size:12px">${initials}</div>
        <span class="reply-author">${esc(r.autor)}</span>
        <span class="reply-time">${tiempo}</span>
        ${esAutor ? `<button class="post-delete" onclick="borrarReply('${postId}','${r.id}')">🗑</button>` : ""}
      </div>
      <div class="reply-text">${esc(r.texto)}</div>
      <div class="reply-emoji-bar">
        ${emojiHtml}
        <button class="reply-emoji-btn" style="font-size:14px" onclick="abrirPicker('${postId}','${r.id}',event)">＋</button>
      </div>
    </div>`;
  }).join("");

  sec.innerHTML = lista + `
  <div class="reply-input-row">
    <textarea class="reply-input" id="reply-input-${postId}"
      placeholder="Escriu la teva resposta…" rows="2" maxlength="300"></textarea>
    <button class="reply-send" onclick="enviarReply('${postId}')">➤</button>
  </div>`;
}

function enviarReply(postId) {
  const inp   = document.getElementById("reply-input-" + postId);
  const texto = inp.value.trim();
  if (!texto) return;
  inp.value   = "";
  inp.disabled = true;
  llamarAppInventor("addReply", { post_id:postId, autor:USUARIO, texto }, (data) => {
    if (data && data.ok) {
      cargarReplies(postId);
      const post = postsCache.find(p => p.id === postId);
      if (post) {
        post.reply_count = (post.reply_count||0) + 1;
        const el = document.querySelector(`#post-${postId} .reply-count`);
        if (el) el.textContent = post.reply_count + " respost" + (post.reply_count!==1?"es":"");
      }
      mostrarToast("Resposta publicada ✓");
    } else {
      mostrarToast("Error al publicar");
      inp.disabled = false;
    }
  });
}

function toggleReaccion(postId, emoji, btn) {
  llamarAppInventor("toggleReaction", {
    post_id: postId, reply_id: "", autor: USUARIO, emoji
  }, (data) => {
    if (data && data.ok) {
      const countEl = btn.querySelector(".emoji-count");
      const current = parseInt(countEl.textContent)||0;
      if (data.action === "added") {
        btn.classList.add("reacted");
        countEl.textContent = current + 1;
      } else {
        btn.classList.remove("reacted");
        countEl.textContent = Math.max(0, current - 1);
      }
    } else {
      mostrarToast("Error al reaccionar");
    }
  });
}

function toggleReaccionReply(postId, replyId, emoji, btn) {
  llamarAppInventor("toggleReaction", {
    post_id: postId, reply_id: replyId, autor: USUARIO, emoji
  }, (data) => {
    if (data && data.ok) {
      const countEl = btn.querySelector(".emoji-count");
      const current = parseInt(countEl.textContent)||0;
      if (data.action === "added") {
        btn.classList.add("reacted");
        countEl.textContent = current + 1;
      } else {
        btn.classList.remove("reacted");
        countEl.textContent = Math.max(0, current - 1);
      }
    } else {
      mostrarToast("Error al reaccionar");
    }
  });
}

function abrirPicker(postId, replyId, e) {
  e.stopPropagation();
  pickerCtx = { postId, replyId };
  const picker = document.getElementById("emoji-picker");
  picker.classList.add("open");
  const rect = e.target.getBoundingClientRect();
  picker.style.bottom = (window.innerHeight - rect.top + 4) + "px";
  picker.style.right  = "16px";
}

function elegirEmoji(emoji) {
  document.getElementById("emoji-picker").classList.remove("open");
  if (!pickerCtx) return;
  const { postId, replyId } = pickerCtx;
  pickerCtx = null;

  if (!replyId) {
    const bar = document.querySelector(`#post-${postId} .emoji-bar`);
    let btn = bar ? bar.querySelector(`[data-emoji="${emoji}"]`) : null;
    if (btn) {
      toggleReaccion(postId, emoji, btn);
    } else {
      if (bar) {
        const newBtn = document.createElement("button");
        newBtn.className = "emoji-btn";
        newBtn.dataset.emoji = emoji;
        newBtn.innerHTML = `${emoji} <span class="emoji-count">0</span>`;
        newBtn.onclick = function() { toggleReaccion(postId, emoji, this); };
        bar.insertBefore(newBtn, bar.querySelector(".emoji-add"));
        toggleReaccion(postId, emoji, newBtn);
      }
    }
  } else {
    const replyEl = document.getElementById("reply-" + replyId);
    if (!replyEl) return;
    let ebar = replyEl.querySelector(".reply-emoji-bar");
    let btn  = ebar ? ebar.querySelector(`[data-emoji="${emoji}"]`) : null;
    if (btn && btn.dataset.emoji) {
      toggleReaccionReply(postId, replyId, emoji, btn);
    } else {
      const newBtn = document.createElement("button");
      newBtn.className = "reply-emoji-btn";
      newBtn.dataset.emoji = emoji;
      newBtn.innerHTML = `${emoji} <span class="emoji-count">0</span>`;
      newBtn.onclick = function() { toggleReaccionReply(postId, replyId, emoji, this); };
      const addBtn = ebar.querySelector("button:last-child");
      ebar.insertBefore(newBtn, addBtn);
      toggleReaccionReply(postId, replyId, emoji, newBtn);
    }
  }
}

document.addEventListener("click", e => {
  if (!e.target.closest(".emoji-picker") && !e.target.closest(".emoji-add") && !e.target.closest(".reply-emoji-btn[onclick*=abrirPicker]")) {
    document.getElementById("emoji-picker").classList.remove("open");
  }
});

function abrirModal() {
  document.getElementById("modal").classList.add("open");
  document.getElementById("new-post-text").focus();
}
function cerrarModal() {
  document.getElementById("modal").classList.remove("open");
}
function selCat(el, cat) {
  document.querySelectorAll(".modal-cat").forEach(x => x.classList.remove("sel"));
  el.classList.add("sel");
  modalCat = cat;
}

function publicarPost() {
  const texto = document.getElementById("new-post-text").value.trim();
  if (!texto) { mostrarToast("Escriu quelcom primer 😊"); return; }
  cerrarModal();
  llamarAppInventor("addPost", { autor:USUARIO, texto, categoria:modalCat }, (data) => {
    if (data && data.ok) {
      document.getElementById("new-post-text").value = "";
      mostrarToast("¡Post publicat! 🎉");
      cargarPosts();
    } else {
      mostrarToast("Error al publicar");
    }
  });
}

function borrarPost(id) {
  if (!confirm("¿Eliminar aquest post?")) return;
  llamarAppInventor("deletePost", { id }, (data) => {
    if (data && data.ok) {
      document.getElementById("post-" + id)?.remove();
      mostrarToast("Post eliminat");
    } else {
      mostrarToast("Error al eliminar");
    }
  });
}

function borrarReply(postId, id) {
  if (!confirm("¿Eliminar aquesta resposta?")) return;
  llamarAppInventor("deleteReply", { id }, (data) => {
    if (data && data.ok) {
      document.getElementById("reply-" + id)?.remove();
      mostrarToast("Resposta eliminada");
    } else {
      mostrarToast("Error al eliminar");
    }
  });
}

function filtrarCat(cat) {
  catActual = cat;
  document.querySelectorAll(".cat").forEach(el => {
    el.classList.toggle("active", el.textContent.includes(cat) || (cat==="Tots" && el.textContent==="Tots"));
  });
  cargarPosts();
}

function tiempoRelativo(ts) {
  if (!ts) return "";
  const diff = (Date.now() - new Date(ts)) / 1000;
  if (diff < 60)    return "ara";
  if (diff < 3600)  return Math.floor(diff/60) + " min";
  if (diff < 86400) return Math.floor(diff/3600) + " h";
  return Math.floor(diff/86400) + " d";
}

function esc(str) {
  return String(str||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
</script>
